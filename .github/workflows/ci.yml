name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          ODOO_URL: https://test.odoo.com
          ODOO_DB: test
          ODOO_USERNAME: test@example.com
          ODOO_PASSWORD: test123
        run: pytest tests/ -v

  security:
    name: Snyk Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  build:
    name: Build Lambda Package
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Lambda package
        run: |
          chmod +x scripts/build_lambda.sh
          ./scripts/build_lambda.sh
      
      - name: Check package size
        run: |
          ZIP_PATH="build/lambda.zip"
          if [ ! -f "$ZIP_PATH" ]; then
            echo "ERROR: $ZIP_PATH not found"
            exit 1
          fi
          SIZE=$(stat -c%s "$ZIP_PATH")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Package size: ${SIZE_MB}MB"
          if [ $SIZE_MB -gt 250 ]; then
            echo "ERROR: Package exceeds 250MB Lambda limit"
            exit 1
          fi

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [test, security, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Create .env file
        run: |
          cat > .env << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          ODOO_URL=${{ secrets.ODOO_URL }}
          ODOO_DB=${{ secrets.ODOO_DB }}
          ODOO_USERNAME=${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD=${{ secrets.ODOO_PASSWORD }}
          EOF
      
      - name: Deploy to AWS
        run: |
          chmod +x scripts/redeploy_all.sh
          ./scripts/redeploy_all.sh